name: Scrape LinkedIn Profiles

on:
  schedule:
    # Mondays at 08:00 UTC (weekly refresh).
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

concurrency:
  group: scrape-linkedin
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scrape and upload to Vercel Blob
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_LINKEDIN_ACTOR_ID: ${{ vars.APIFY_LINKEDIN_ACTOR_ID }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: bun run scrape:linkedin
